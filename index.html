<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ AIR DRAW</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    width: 100vw; height: 100vh;
    font-family: 'Share Tech Mono', monospace;
    cursor: none;
  }

  /* Layer 1 — mirrored webcam */
  #webcamCanvas {
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
    z-index: 1;
  }

  /* Layer 2 — neon trails (transparent) */
  #drawCanvas {
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
    z-index: 2;
    pointer-events: none;
  }

  /* Scanlines */
  #scanlines {
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.05) 3px,rgba(0,0,0,0.05) 4px);
    pointer-events: none;
    z-index: 3;
  }

  /* Hidden video source */
  #video { display: none; }

  /* Cursor ring */
  #cursor {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 10;
    transform: translate(-50%, -50%);
    mix-blend-mode: screen;
    transition: width 0.08s, height 0.08s, opacity 0.15s;
    opacity: 0;
  }

  /* Gesture badge — top center */
  #gesture-badge {
    position: fixed;
    top: 18px; left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    padding: 6px 22px;
    border-radius: 30px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(0,0,0,0.5);
    color: #00ffe7;
    text-shadow: 0 0 10px #00ffe7;
    backdrop-filter: blur(8px);
    pointer-events: none;
    transition: color 0.2s, border-color 0.2s, text-shadow 0.2s;
  }

  /* Gesture guide — top right */
  #guide {
    position: fixed;
    top: 16px; right: 16px;
    z-index: 10;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 10px 14px;
    backdrop-filter: blur(8px);
    display: flex;
    flex-direction: column;
    gap: 6px;
    pointer-events: none;
  }
  .guide-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.62rem; color: rgba(255,255,255,0.5);
    letter-spacing: 0.06em;
  }
  .guide-row span:first-child { font-size: 0.88rem; }

  /* Floating toolbar — bottom center */
  #toolbar {
    position: fixed;
    bottom: 22px; left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 50px;
    padding: 9px 18px;
    backdrop-filter: blur(12px);
    pointer-events: all;
    box-shadow: 0 4px 30px rgba(0,0,0,0.6);
    flex-wrap: nowrap;
  }

  .tb-sep { width: 1px; height: 26px; background: rgba(255,255,255,0.12); flex-shrink: 0; }

  .swatch {
    width: 22px; height: 22px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .swatch:hover { transform: scale(1.3); }
  .swatch.active { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.8); }

  #colorPicker {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    background: transparent;
    cursor: pointer;
    padding: 1px;
    flex-shrink: 0;
  }

  .slider-wrap { display: flex; align-items: center; gap: 6px; }
  .sl-icon { font-size: 0.7rem; color: rgba(255,255,255,0.45); white-space: nowrap; min-width: 20px; }

  input[type=range] {
    -webkit-appearance: none;
    width: 75px; height: 3px;
    border-radius: 2px;
    background: rgba(255,255,255,0.18);
    outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px; height: 13px;
    border-radius: 50%;
    background: #00ffe7;
    box-shadow: 0 0 6px #00ffe7;
    cursor: pointer;
  }

  .tb-btn {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.13);
    border-radius: 8px;
    color: rgba(255,255,255,0.65);
    font-size: 0.75rem;
    padding: 5px 10px;
    cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tb-btn:hover { background: rgba(255,255,255,0.16); color: #fff; }
  .tb-btn.danger:hover { background: rgba(255,45,120,0.25); color: #ff2d78; border-color: rgba(255,45,120,0.5); }

  /* Loading screen */
  #cam-status {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
    background: #000;
    z-index: 20;
    color: #00ffe7;
    font-family: 'Orbitron', sans-serif;
  }
  #cam-status .icon { font-size: 3rem; }
  #cam-status p { font-size: 0.78rem; letter-spacing: 0.15em; opacity: 0.55; }
</style>
</head>
<body>

<div id="cam-status">
  <div class="icon">📷</div>
  <p>REQUESTING CAMERA ACCESS...</p>
</div>

<!-- Webcam fills screen -->
<canvas id="webcamCanvas"></canvas>

<!-- Neon trails on top -->
<canvas id="drawCanvas"></canvas>

<div id="scanlines"></div>

<video id="video" playsinline></video>
<div id="cursor"></div>
<div id="gesture-badge">· DETECTING HAND</div>

<div id="guide">
  <div class="guide-row"><span>☝️</span><span>1 finger — draw</span></div>
  <div class="guide-row"><span>✌️</span><span>2 fingers — move</span></div>
  <div class="guide-row"><span>🖐️</span><span>open palm — erase</span></div>
  <div class="guide-row"><span>✊</span><span>fist — pause</span></div>
</div>

<div id="toolbar">
  <div id="swatch-row" style="display:flex;gap:7px;align-items:center;"></div>
  <input type="color" id="colorPicker" value="#00ffe7" title="Custom color">
  <div class="tb-sep"></div>
  <div class="slider-wrap">
    <span class="sl-icon">●</span>
    <input type="range" id="brushSize" min="2" max="40" value="6">
    <span class="sl-icon" id="sizeVal" style="min-width:26px">6px</span>
  </div>
  <div class="slider-wrap">
    <span class="sl-icon">✦</span>
    <input type="range" id="glowSize" min="0" max="60" value="20">
  </div>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="saveBtn">⬇ Save</button>
  <button class="tb-btn danger" id="clearBtn">✕ Clear</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ── Elements ──
const webcamCanvas = document.getElementById('webcamCanvas');
const wCtx         = webcamCanvas.getContext('2d');
const drawCanvas   = document.getElementById('drawCanvas');
const dCtx         = drawCanvas.getContext('2d');
const video        = document.getElementById('video');
const cursorEl     = document.getElementById('cursor');
const badge        = document.getElementById('gesture-badge');
const camStatus    = document.getElementById('cam-status');

// ── State ──
let color     = '#00ffe7';
let brushSize = 6;
let glow      = 20;
let prevX = null, prevY = null;
let panStartX = null, panStartY = null;
let offsetX = 0, offsetY = 0, panBX = 0, panBY = 0;

// Off-screen persistent trail canvas
const trail  = document.createElement('canvas');
const trailC = trail.getContext('2d');

// ── Resize ──
function resize() {
  const W = window.innerWidth, H = window.innerHeight;
  webcamCanvas.width = W; webcamCanvas.height = H;
  drawCanvas.width   = W; drawCanvas.height   = H;
  const img = trailC.getImageData(0, 0, trail.width, trail.height);
  trail.width = W; trail.height = H;
  trailC.putImageData(img, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ── Palette ──
const COLORS = ['#00ffe7','#ff2d78','#ffe600','#7c3aed','#00ff99','#ff6b00','#00b4ff','#ff00cc','#39ff14','#ffffff'];
const swatchRow = document.getElementById('swatch-row');
COLORS.forEach(c => {
  const sw = document.createElement('div');
  sw.className = 'swatch' + (c === color ? ' active' : '');
  sw.style.cssText = `background:${c};box-shadow:0 0 5px ${c}88`;
  sw.onclick = () => {
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    color = c;
    document.getElementById('colorPicker').value = c;
    refreshCursor();
  };
  swatchRow.appendChild(sw);
});
document.getElementById('colorPicker').addEventListener('input', e => {
  color = e.target.value;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
  refreshCursor();
});

// ── Sliders ──
document.getElementById('brushSize').addEventListener('input', e => {
  brushSize = +e.target.value;
  document.getElementById('sizeVal').textContent = brushSize + 'px';
  refreshCursor();
});
document.getElementById('glowSize').addEventListener('input', e => { glow = +e.target.value; });

// ── Cursor ──
function refreshCursor(col) {
  const c = col || color;
  const sz = Math.max(brushSize * 2.5, 14);
  cursorEl.style.width  = sz + 'px';
  cursorEl.style.height = sz + 'px';
  cursorEl.style.background  = c + '33';
  cursorEl.style.border      = `2px solid ${c}`;
  cursorEl.style.boxShadow   = `0 0 ${glow}px ${c}, 0 0 ${glow*2}px ${c}44`;
}
refreshCursor();

// ── Draw helpers ──
function glowLine(x1,y1,x2,y2,col,sz,gl) {
  trailC.save();
  trailC.lineCap = 'round'; trailC.lineJoin = 'round';
  for (let i = 3; i >= 1; i--) {
    trailC.globalAlpha  = 0.06 / i;
    trailC.strokeStyle  = col;
    trailC.lineWidth    = sz + gl * i * 0.7;
    trailC.shadowColor  = col;
    trailC.shadowBlur   = gl * i * 1.5;
    trailC.beginPath(); trailC.moveTo(x1,y1); trailC.lineTo(x2,y2); trailC.stroke();
  }
  trailC.globalAlpha = 1;
  trailC.strokeStyle = col; trailC.lineWidth = sz;
  trailC.shadowColor = col; trailC.shadowBlur = gl;
  trailC.beginPath(); trailC.moveTo(x1,y1); trailC.lineTo(x2,y2); trailC.stroke();
  trailC.globalAlpha = 0.6;
  trailC.strokeStyle = '#fff'; trailC.lineWidth = Math.max(sz*0.2,1); trailC.shadowBlur = 0;
  trailC.beginPath(); trailC.moveTo(x1,y1); trailC.lineTo(x2,y2); trailC.stroke();
  trailC.restore();
}

function eraseAt(x, y) {
  trailC.save();
  trailC.globalCompositeOperation = 'destination-out';
  const r = Math.max(brushSize * 5, 28);
  trailC.beginPath(); trailC.arc(x, y, r, 0, Math.PI*2);
  trailC.fillStyle = 'rgba(0,0,0,1)'; trailC.fill();
  trailC.restore();
}

// ── Render loop ──
function render() {
  const W = webcamCanvas.width, H = webcamCanvas.height;
  // Webcam — mirrored
  wCtx.save();
  wCtx.translate(W, 0); wCtx.scale(-1, 1);
  if (video.readyState >= 2) wCtx.drawImage(video, 0, 0, W, H);
  wCtx.restore();
  // Trails overlay
  dCtx.clearRect(0, 0, W, H);
  dCtx.drawImage(trail, offsetX, offsetY);
  requestAnimationFrame(render);
}
render();

// ── Gesture badge ──
const G_INFO = {
  draw:  { label:'☝ DRAWING',   col:'#00ffe7' },
  erase: { label:'🖐 ERASING',  col:'#ff2d78' },
  pause: { label:'✊ PAUSED',   col:'#ffe600' },
  move:  { label:'✌ MOVING',   col:'#a855f7' },
  none:  { label:'· HAND DETECTED', col:'rgba(255,255,255,0.4)' },
};
function showBadge(g) {
  const i = G_INFO[g] || G_INFO.none;
  badge.textContent    = i.label;
  badge.style.color    = i.col;
  badge.style.textShadow   = `0 0 10px ${i.col}`;
  badge.style.borderColor  = i.col + '44';
}

// ── Gesture classifier ──
function classify(lm) {
  const tips=[8,12,16,20], pips=[6,10,14,18];
  const e = tips.map((t,i) => lm[t].y < lm[pips[i]].y);
  if (e[0]&&e[1]&&e[2]&&e[3]) return 'erase';
  if (!e[0]&&!e[1]&&!e[2]&&!e[3]) return 'pause';
  if (e[0]&&e[1]&&!e[2]&&!e[3]) return 'move';
  if (e[0]&&!e[1]&&!e[2]&&!e[3]) return 'draw';
  return 'none';
}

// ── MediaPipe ──
const hands = new Hands({ locateFile: f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
hands.setOptions({ maxNumHands:1, modelComplexity:1, minDetectionConfidence:0.72, minTrackingConfidence:0.6 });

hands.onResults(res => {
  if (!res.multiHandLandmarks?.length) {
    showBadge('none');
    badge.textContent = '· NO HAND DETECTED';
    prevX = panStartX = null;
    cursorEl.style.opacity = '0';
    return;
  }

  const lm = res.multiHandLandmarks[0];
  const g  = classify(lm);
  showBadge(g);

  // Index fingertip — map to screen (mirrored)
  const fx = (1 - lm[8].x) * drawCanvas.width;
  const fy = lm[8].y * drawCanvas.height;

  cursorEl.style.opacity = '1';
  cursorEl.style.left = fx + 'px';
  cursorEl.style.top  = fy + 'px';

  if (g === 'draw') {
    refreshCursor();
    if (prevX !== null) glowLine(prevX-offsetX, prevY-offsetY, fx-offsetX, fy-offsetY, color, brushSize, glow);
    prevX = fx; prevY = fy;
    panStartX = null;
  }
  else if (g === 'erase') {
    const er = Math.max(brushSize*5, 28);
    cursorEl.style.width  = er*2+'px'; cursorEl.style.height = er*2+'px';
    cursorEl.style.border      = '2px solid #ff2d78';
    cursorEl.style.background  = 'rgba(255,45,120,0.1)';
    cursorEl.style.boxShadow   = '0 0 20px #ff2d78, 0 0 40px #ff2d7844';
    eraseAt(fx-offsetX, fy-offsetY);
    prevX = panStartX = null;
  }
  else if (g === 'move') {
    refreshCursor('#a855f7');
    if (panStartX === null) { panStartX=fx; panStartY=fy; panBX=offsetX; panBY=offsetY; }
    else { offsetX=panBX+(fx-panStartX); offsetY=panBY+(fy-panStartY); }
    prevX = null;
  }
  else {
    // pause / none
    prevX = panStartX = null;
    refreshCursor();
  }

  if (g !== 'move')  panStartX = null;
  if (g !== 'erase') refreshCursor();
});

// ── Camera ──
new Camera(video, {
  onFrame: async () => { await hands.send({ image: video }); },
  width: 1280, height: 720,
}).start().then(() => {
  camStatus.style.display = 'none';
}).catch(() => {
  camStatus.querySelector('p').textContent = 'CAMERA ACCESS DENIED — please allow camera permission.';
});

// ── Controls ──
document.getElementById('clearBtn').onclick = () => {
  trailC.clearRect(0, 0, trail.width, trail.height);
  offsetX = offsetY = 0;
};

document.getElementById('saveBtn').onclick = () => {
  const tmp = document.createElement('canvas');
  tmp.width  = webcamCanvas.width;
  tmp.height = webcamCanvas.height;
  const tc = tmp.getContext('2d');
  tc.save(); tc.translate(tmp.width,0); tc.scale(-1,1);
  tc.drawImage(video, 0, 0, tmp.width, tmp.height);
  tc.restore();
  tc.drawImage(trail, offsetX, offsetY);
  const a = document.createElement('a');
  a.download = 'airdraw_' + Date.now() + '.png';
  a.href = tmp.toDataURL('image/png');
  a.click();
};
</script>
</body>
</html>
