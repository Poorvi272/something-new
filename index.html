<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Air Drawing</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #controls {
            position: absolute;
            top: 20px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 50px;
            display: flex;
            gap: 20px;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            transform: scaleX(-1); /* Mirror the drawing */
        }

        #webcam {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            border-radius: 10px;
            border: 2px solid #333;
            transform: scaleX(-1);
            object-fit: cover;
            z-index: 5;
        }

        label { font-size: 14px; font-weight: bold; }
        input[type="range"] { cursor: pointer; }
        input[type="color"] { 
            border: none; 
            width: 30px; 
            height: 30px; 
            background: none; 
            cursor: pointer;
        }

        .status {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc;
        }
    </style>
</head>
<body>

    <div id="controls">
        <div class="control-group">
            <label>Color: </label>
            <input type="color" id="colorPicker" value="#00f3ff">
        </div>
        <div class="control-group">
            <label>Size: </label>
            <input type="range" id="brushSize" min="2" max="30" value="8">
        </div>
        <button onclick="clearCanvas()" style="background: #ff4757; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">Manual Clear</button>
    </div>

    <div class="status" id="gestureStatus">Detecting Hand...</div>

    <div class="canvas-container">
        <canvas id="drawingCanvas"></canvas>
        <canvas id="uiCanvas"></canvas>
    </div>

    <video id="webcam" autoplay playsinline></video>

    <script>
        const videoElement = document.getElementById('webcam');
        const drawCanvas = document.getElementById('drawingCanvas');
        const uiCanvas = document.getElementById('uiCanvas');
        const dctx = drawCanvas.getContext('2d');
        const uictx = uiCanvas.getContext('2d');
        const statusText = document.getElementById('gestureStatus');
        
        let lastX = null;
        let lastY = null;

        // Resize canvases
        function resize() {
            drawCanvas.width = uiCanvas.width = window.innerWidth;
            drawCanvas.height = uiCanvas.height = window.innerHeight;
            // Fill background
            dctx.fillStyle = '#0a0a0a';
            dctx.fillRect(0, 0, drawCanvas.width, drawCanvas.height);
        }
        window.addEventListener('resize', resize);
        resize();

        function clearCanvas() {
            dctx.fillStyle = '#0a0a0a';
            dctx.fillRect(0, 0, drawCanvas.width, drawCanvas.height);
        }

        function onResults(results) {
            uictx.clearRect(0, 0, uiCanvas.width, uiCanvas.height);
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // Finger landmarks
                const indexTip = landmarks[8];
                const indexPip = landmarks[6];
                const middleTip = landmarks[12];
                const ringTip = landmarks[16];
                const pinkyTip = landmarks[20];
                const palmBase = landmarks[0];

                // Convert normalized coordinates to pixel coordinates
                const x = indexTip.x * drawCanvas.width;
                const y = indexTip.y * drawCanvas.height;

                // Simple Gesture Logic
                const isIndexUp = indexTip.y < indexPip.y;
                const isMiddleUp = middleTip.y < landmarks[10].y;
                const isRingUp = ringTip.y < landmarks[14].y;
                const isPinkyUp = pinkyTip.y < landmarks[18].y;

                // Count extended fingers
                const extendedFingers = [isIndexUp, isMiddleUp, isRingUp, isPinkyUp].filter(Boolean).length;

                if (extendedFingers >= 3) {
                    // PALM: Erase
                    statusText.innerText = "ERASING (Palm)";
                    clearCanvas();
                    lastX = null; lastY = null;
                } else if (extendedFingers === 0) {
                    // FIST: Pause
                    statusText.innerText = "PAUSED (Fist)";
                    lastX = null; lastY = null;
                } else if (isIndexUp) {
                    // INDEX: Draw
                    statusText.innerText = "DRAWING...";
                    draw(x, y);
                }

                // Show pointer on UI layer
                uictx.beginPath();
                uictx.arc(x, y, 10, 0, Math.PI * 2);
                uictx.fillStyle = document.getElementById('colorPicker').value;
                uictx.fill();
            } else {
                statusText.innerText = "No Hand Detected";
                lastX = null; lastY = null;
            }
        }

        function draw(x, y) {
            const color = document.getElementById('colorPicker').value;
            const size = document.getElementById('brushSize').value;

            if (lastX !== null && lastY !== null) {
                dctx.beginPath();
                dctx.moveTo(lastX, lastY);
                dctx.lineTo(x, y);
                
                // Glow effect
                dctx.shadowBlur = 15;
                dctx.shadowColor = color;
                dctx.strokeStyle = color;
                dctx.lineWidth = size;
                dctx.lineCap = 'round';
                dctx.stroke();
            }
            lastX = x;
            lastY = y;
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        camera.start();
    </script>
</body>
</html>
