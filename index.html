<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ AIR DRAW</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --neon: #00ffe7;
    --neon2: #ff2d78;
    --neon3: #ffe600;
    --bg: #030510;
    --panel: rgba(5, 12, 30, 0.92);
    --border: rgba(0,255,231,0.18);
    --glow: 0 0 12px #00ffe7, 0 0 30px rgba(0,255,231,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--neon);
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    z-index: 10;
    flex-shrink: 0;
  }

  #logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 1.3rem;
    letter-spacing: 0.2em;
    text-shadow: var(--glow);
    color: var(--neon);
  }

  #logo span { color: var(--neon2); }

  #status-bar {
    display: flex;
    gap: 18px;
    align-items: center;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    padding: 4px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: rgba(0,255,231,0.04);
    text-transform: uppercase;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #333;
    transition: all 0.3s;
  }
  .status-dot.active { background: var(--neon); box-shadow: 0 0 6px var(--neon); }
  .status-dot.erase { background: var(--neon2); box-shadow: 0 0 6px var(--neon2); }
  .status-dot.pause { background: var(--neon3); box-shadow: 0 0 6px var(--neon3); }
  .status-dot.move { background: #a855f7; box-shadow: 0 0 6px #a855f7; }

  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #drawCanvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    cursor: none;
  }

  #videoCanvas {
    position: absolute;
    bottom: 16px; right: 16px;
    width: 200px; height: 150px;
    border: 1px solid var(--border);
    border-radius: 8px;
    opacity: 0.75;
    z-index: 5;
    box-shadow: 0 0 16px rgba(0,255,231,0.15);
  }

  #video { display: none; }

  #cursor {
    position: absolute;
    width: 18px; height: 18px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 20;
    transform: translate(-50%, -50%);
    transition: width 0.1s, height 0.1s;
    mix-blend-mode: screen;
  }

  #sidebar {
    width: 210px;
    flex-shrink: 0;
    background: var(--panel);
    border-left: 1px solid var(--border);
    padding: 18px 14px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
    z-index: 10;
  }

  .panel-section {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .panel-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(0,255,231,0.5);
    border-bottom: 1px solid var(--border);
    padding-bottom: 5px;
    font-family: 'Orbitron', sans-serif;
  }

  /* Color swatches */
  #color-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }

  .swatch {
    width: 28px; height: 28px;
    border-radius: 6px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
    position: relative;
  }

  .swatch:hover { transform: scale(1.15); }
  .swatch.selected { border-color: white; box-shadow: 0 0 8px rgba(255,255,255,0.7); }

  #custom-color-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.72rem;
  }

  #colorPicker {
    width: 36px; height: 28px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: none;
    cursor: pointer;
    padding: 1px;
  }

  /* Sliders */
  .slider-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .slider-label-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    color: rgba(0,255,231,0.7);
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: rgba(0,255,231,0.15);
    outline: none;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--neon);
    box-shadow: 0 0 8px var(--neon);
    cursor: pointer;
  }

  /* Gesture guide */
  .gesture-list {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .gesture-item {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 0.7rem;
    color: rgba(200,255,250,0.65);
  }

  .gesture-icon {
    font-size: 1.1rem;
    min-width: 22px;
    text-align: center;
  }

  /* Buttons */
  .btn {
    width: 100%;
    padding: 8px;
    background: rgba(0,255,231,0.07);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--neon);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .btn:hover {
    background: rgba(0,255,231,0.15);
    box-shadow: var(--glow);
  }

  .btn.danger {
    color: var(--neon2);
    border-color: rgba(255,45,120,0.25);
    background: rgba(255,45,120,0.05);
  }
  .btn.danger:hover { background: rgba(255,45,120,0.15); box-shadow: 0 0 12px var(--neon2); }

  #gesture-display {
    position: absolute;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    padding: 6px 18px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: rgba(3, 5, 16, 0.85);
    pointer-events: none;
    z-index: 15;
    transition: all 0.3s;
    text-shadow: var(--glow);
  }

  #cam-status {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    z-index: 5;
  }

  #cam-status .big-icon { font-size: 3rem; }
  #cam-status p { font-size: 0.8rem; color: rgba(0,255,231,0.5); margin-top: 10px; letter-spacing: 0.1em; }

  /* Glow intensity toggle */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.72rem;
    color: rgba(0,255,231,0.7);
  }

  .toggle {
    width: 36px; height: 18px;
    border-radius: 9px;
    background: rgba(0,255,231,0.1);
    border: 1px solid var(--border);
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
  }

  .toggle.on { background: rgba(0,255,231,0.3); }

  .toggle::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--neon);
    top: 2px; left: 2px;
    transition: left 0.2s;
    box-shadow: 0 0 6px var(--neon);
  }

  .toggle.on::after { left: 20px; }

  /* Scanline overlay */
  #scanlines {
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 100;
  }
</style>
</head>
<body>

<div id="scanlines"></div>

<div id="header">
  <div id="logo">AIR<span>·</span>DRAW</div>
  <div id="status-bar">
    <div class="status-pill">
      <div class="status-dot" id="dot-draw"></div>DRAW
    </div>
    <div class="status-pill">
      <div class="status-dot erase" id="dot-erase" style="background:#333;box-shadow:none"></div>ERASE
    </div>
    <div class="status-pill">
      <div class="status-dot pause" id="dot-pause" style="background:#333;box-shadow:none"></div>PAUSE
    </div>
    <div class="status-pill">
      <div class="status-dot move" id="dot-move" style="background:#333;box-shadow:none"></div>MOVE
    </div>
  </div>
</div>

<div id="main">
  <div id="canvas-wrap">
    <canvas id="drawCanvas"></canvas>
    <canvas id="videoCanvas"></canvas>
    <video id="video" playsinline></video>
    <div id="gesture-display">☝ POINT TO DRAW</div>
    <div id="cam-status">
      <div class="big-icon">📷</div>
      <p>INITIALIZING CAMERA...</p>
    </div>
    <div id="cursor"></div>
  </div>

  <div id="sidebar">
    <div class="panel-section">
      <div class="panel-label">Brush Color</div>
      <div id="color-grid"></div>
      <div id="custom-color-wrap">
        <input type="color" id="colorPicker" value="#00ffe7">
        <span>Custom</span>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-label">Brush Size</div>
      <div class="slider-row">
        <div class="slider-label-row"><span>Thickness</span><span id="sizeVal">6</span>px</div>
        <input type="range" id="brushSize" min="1" max="40" value="6">
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-label">Glow</div>
      <div class="slider-row">
        <div class="slider-label-row"><span>Intensity</span><span id="glowVal">20</span></div>
        <input type="range" id="glowSize" min="0" max="60" value="20">
      </div>
      <div class="toggle-row">
        <span>Trail Fade</span>
        <div class="toggle on" id="fadeToggle"></div>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-label">Gestures</div>
      <div class="gesture-list">
        <div class="gesture-item"><span class="gesture-icon">☝️</span><span>1 finger — draw</span></div>
        <div class="gesture-item"><span class="gesture-icon">🖐️</span><span>Open palm — erase</span></div>
        <div class="gesture-item"><span class="gesture-icon">✊</span><span>Closed fist — pause</span></div>
        <div class="gesture-item"><span class="gesture-icon">✌️</span><span>2 fingers — move</span></div>
      </div>
    </div>

    <div class="panel-section">
      <button class="btn" id="saveBtn">⬇ Save Image</button>
      <button class="btn danger" id="clearBtn">✕ Clear Canvas</button>
    </div>
  </div>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ---- Setup ----
const drawCanvas = document.getElementById('drawCanvas');
const drawCtx = drawCanvas.getContext('2d');
const videoCanvas = document.getElementById('videoCanvas');
const vidCtx = videoCanvas.getContext('2d');
const video = document.getElementById('video');
const cursorEl = document.getElementById('cursor');
const gestureDisplay = document.getElementById('gesture-display');
const camStatus = document.getElementById('cam-status');

let currentColor = '#00ffe7';
let brushSize = 6;
let glowAmount = 20;
let fadeEnabled = true;
let prevX = null, prevY = null;
let currentGesture = 'none';
let isDrawing = false;
let lastMoveX = null, lastMoveY = null;

// For panning
let offsetX = 0, offsetY = 0;
let panStartX = null, panStartY = null;
let panOffsetStartX = 0, panOffsetStartY = 0;

// Persistent draw layer
let persistCanvas = document.createElement('canvas');
let persistCtx = persistCanvas.getContext('2d');

// ---- Resize ----
function resize() {
  const w = drawCanvas.parentElement.clientWidth;
  const h = drawCanvas.parentElement.clientHeight;
  // Save current drawing
  const imgData = persistCtx.getImageData(0, 0, persistCanvas.width, persistCanvas.height);
  drawCanvas.width = w; drawCanvas.height = h;
  persistCanvas.width = w; persistCanvas.height = h;
  persistCtx.putImageData(imgData, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ---- Color Swatches ----
const COLORS = [
  '#00ffe7','#ff2d78','#ffe600','#7c3aed','#00ff99',
  '#ff6b00','#00b4ff','#ff00cc','#39ff14','#ffffff',
];
const colorGrid = document.getElementById('color-grid');
COLORS.forEach(c => {
  const sw = document.createElement('div');
  sw.className = 'swatch' + (c === currentColor ? ' selected' : '');
  sw.style.background = c;
  sw.style.boxShadow = `0 0 8px ${c}55`;
  sw.onclick = () => {
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
    sw.classList.add('selected');
    currentColor = c;
    document.getElementById('colorPicker').value = c;
    updateCursor();
  };
  colorGrid.appendChild(sw);
});

document.getElementById('colorPicker').addEventListener('input', e => {
  currentColor = e.target.value;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
  updateCursor();
});

// ---- Sliders ----
const brushSlider = document.getElementById('brushSize');
const glowSlider = document.getElementById('glowSize');
brushSlider.addEventListener('input', e => {
  brushSize = +e.target.value;
  document.getElementById('sizeVal').textContent = brushSize;
  updateCursor();
});
glowSlider.addEventListener('input', e => {
  glowAmount = +e.target.value;
  document.getElementById('glowVal').textContent = glowAmount;
});

// ---- Fade Toggle ----
const fadeToggle = document.getElementById('fadeToggle');
fadeToggle.addEventListener('click', () => {
  fadeEnabled = !fadeEnabled;
  fadeToggle.classList.toggle('on', fadeEnabled);
});

// ---- Cursor ----
function updateCursor() {
  const sz = Math.max(brushSize * 2, 12);
  cursorEl.style.width = sz + 'px';
  cursorEl.style.height = sz + 'px';
  cursorEl.style.background = currentColor + '55';
  cursorEl.style.boxShadow = `0 0 ${glowAmount}px ${currentColor}, 0 0 ${glowAmount*2}px ${currentColor}55`;
  cursorEl.style.border = `2px solid ${currentColor}`;
}
updateCursor();

// ---- Draw ----
function drawGlowLine(x1, y1, x2, y2, color, size, glow) {
  persistCtx.save();
  persistCtx.lineCap = 'round';
  persistCtx.lineJoin = 'round';
  // Outer glow layers
  for (let i = 3; i >= 1; i--) {
    persistCtx.globalAlpha = 0.08 / i;
    persistCtx.strokeStyle = color;
    persistCtx.lineWidth = size + glow * i * 0.5;
    persistCtx.shadowColor = color;
    persistCtx.shadowBlur = glow * i;
    persistCtx.beginPath();
    persistCtx.moveTo(x1, y1);
    persistCtx.lineTo(x2, y2);
    persistCtx.stroke();
  }
  // Core line
  persistCtx.globalAlpha = 1;
  persistCtx.strokeStyle = color;
  persistCtx.lineWidth = size;
  persistCtx.shadowColor = color;
  persistCtx.shadowBlur = glow;
  persistCtx.beginPath();
  persistCtx.moveTo(x1, y1);
  persistCtx.lineTo(x2, y2);
  persistCtx.stroke();
  // Bright center
  persistCtx.globalAlpha = 0.7;
  persistCtx.strokeStyle = '#ffffff';
  persistCtx.lineWidth = Math.max(size * 0.25, 1);
  persistCtx.shadowBlur = 0;
  persistCtx.beginPath();
  persistCtx.moveTo(x1, y1);
  persistCtx.lineTo(x2, y2);
  persistCtx.stroke();
  persistCtx.restore();
}

function eraseAt(x, y, size) {
  persistCtx.save();
  persistCtx.globalCompositeOperation = 'destination-out';
  persistCtx.beginPath();
  persistCtx.arc(x, y, size * 6, 0, Math.PI * 2);
  persistCtx.fillStyle = 'rgba(0,0,0,1)';
  persistCtx.fill();
  persistCtx.restore();
}

// ---- Render loop ----
function render() {
  drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  // Dark BG
  drawCtx.fillStyle = '#030510';
  drawCtx.fillRect(0, 0, drawCanvas.width, drawCanvas.height);
  // Fade effect
  if (fadeEnabled) {
    drawCtx.fillStyle = 'rgba(3,5,16,0.008)';
    drawCtx.fillRect(0, 0, drawCanvas.width, drawCanvas.height);
  }
  // Draw persist canvas with offset
  drawCtx.drawImage(persistCanvas, offsetX, offsetY);
  requestAnimationFrame(render);
}
render();

// ---- Status dots ----
function setGestureUI(gesture) {
  const dots = {
    draw: document.getElementById('dot-draw'),
    erase: document.getElementById('dot-erase'),
    pause: document.getElementById('dot-pause'),
    move: document.getElementById('dot-move'),
  };
  Object.values(dots).forEach(d => { d.style.background='#333'; d.style.boxShadow='none'; });

  const icons = {
    draw: { dot: dots.draw, color: '#00ffe7', label: '☝ DRAWING', color2: 'var(--neon)' },
    erase: { dot: dots.erase, color: '#ff2d78', label: '🖐 ERASING', color2: 'var(--neon2)' },
    pause: { dot: dots.pause, color: '#ffe600', label: '✊ PAUSED', color2: 'var(--neon3)' },
    move: { dot: dots.move, color: '#a855f7', label: '✌ MOVING', color2: '#a855f7' },
    none: { dot: null, color: '', label: '· DETECTING', color2: 'rgba(0,255,231,0.5)' },
  };
  const info = icons[gesture] || icons.none;
  if (info.dot) {
    info.dot.style.background = info.color;
    info.dot.style.boxShadow = `0 0 6px ${info.color}`;
  }
  gestureDisplay.textContent = info.label;
  gestureDisplay.style.color = info.color2;
  gestureDisplay.style.borderColor = info.color + '44';
}

// ---- Gesture Detection ----
function getFingerState(landmarks) {
  const tips = [8, 12, 16, 20]; // index, middle, ring, pinky
  const pips = [6, 10, 14, 18];
  const extended = tips.map((tip, i) => landmarks[tip].y < landmarks[pips[i]].y);
  const thumbExtended = landmarks[4].x < landmarks[3].x; // rough
  return { extended, thumbExtended };
}

function classifyGesture(landmarks) {
  const { extended } = getFingerState(landmarks);
  const [idx, mid, rng, pnk] = extended;
  const allExtended = idx && mid && rng && pnk;
  const allClosed = !idx && !mid && !rng && !pnk;

  if (allExtended) return 'erase';
  if (allClosed) return 'pause';
  if (idx && mid && !rng && !pnk) return 'move';
  if (idx && !mid && !rng && !pnk) return 'draw';
  return 'none';
}

// ---- MediaPipe Hands ----
const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.6,
});

hands.onResults(results => {
  // Mirror video to canvas
  vidCtx.save();
  vidCtx.scale(-1, 1);
  vidCtx.drawImage(results.image, -videoCanvas.width, 0, videoCanvas.width, videoCanvas.height);
  vidCtx.restore();

  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    currentGesture = 'none';
    setGestureUI('none');
    prevX = null; prevY = null;
    cursorEl.style.display = 'none';
    return;
  }

  const lm = results.multiHandLandmarks[0];
  const gesture = classifyGesture(lm);
  currentGesture = gesture;
  setGestureUI(gesture);

  // Index finger tip position (mirrored)
  const fx = (1 - lm[8].x) * drawCanvas.width;
  const fy = lm[8].y * drawCanvas.height;

  // Cursor
  cursorEl.style.display = 'block';
  cursorEl.style.left = fx + 'px';
  cursorEl.style.top = fy + 'px';

  if (gesture === 'draw') {
    cursorEl.style.borderColor = currentColor;
    if (prevX !== null) {
      drawGlowLine(prevX - offsetX, prevY - offsetY, fx - offsetX, fy - offsetY, currentColor, brushSize, glowAmount);
    }
    prevX = fx; prevY = fy;
  } else if (gesture === 'erase') {
    cursorEl.style.borderColor = '#ff2d78';
    cursorEl.style.width = '60px'; cursorEl.style.height = '60px';
    eraseAt(fx - offsetX, fy - offsetY, brushSize);
    prevX = null; prevY = null;
  } else if (gesture === 'move') {
    cursorEl.style.borderColor = '#a855f7';
    if (panStartX === null) {
      panStartX = fx; panStartY = fy;
      panOffsetStartX = offsetX; panOffsetStartY = offsetY;
    } else {
      offsetX = panOffsetStartX + (fx - panStartX);
      offsetY = panOffsetStartY + (fy - panStartY);
    }
    prevX = null; prevY = null;
  } else {
    panStartX = null; panStartY = null;
    prevX = null; prevY = null;
    updateCursor();
  }

  if (gesture !== 'move') { panStartX = null; panStartY = null; }
  if (gesture !== 'erase') updateCursor();
});

// ---- Camera ----
const camera = new Camera(video, {
  onFrame: async () => { await hands.send({ image: video }); },
  width: 640, height: 480,
});

camera.start().then(() => {
  camStatus.style.display = 'none';
}).catch(err => {
  camStatus.querySelector('p').textContent = 'Camera access denied. Please allow camera.';
  console.error(err);
});

// ---- Controls ----
document.getElementById('clearBtn').onclick = () => {
  persistCtx.clearRect(0, 0, persistCanvas.width, persistCanvas.height);
  offsetX = 0; offsetY = 0;
};

document.getElementById('saveBtn').onclick = () => {
  const tmp = document.createElement('canvas');
  tmp.width = drawCanvas.width; tmp.height = drawCanvas.height;
  const tc = tmp.getContext('2d');
  tc.fillStyle = '#030510';
  tc.fillRect(0, 0, tmp.width, tmp.height);
  tc.drawImage(persistCanvas, offsetX, offsetY);
  const a = document.createElement('a');
  a.download = 'airdraw.png';
  a.href = tmp.toDataURL('image/png');
  a.click();
};
</script>
</body>
